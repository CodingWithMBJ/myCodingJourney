<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Paragraphs</title>
  </head>
  <body>
    <h1>Paragraphs</h1>
    <p>This is a paragraph</p>
    <p>This is another paragraph</p>
    <p>This is another paragraph</p>
    <p>
      A. paragraph tag (p) allows us to add regular size text to our website,
      its a tag that is block scope meaning it will be on a line by itself by
      starting a new line and not inline with another piece of content
    </p>
  </body>
</html>
